# DjangoBlog Nginx 配置
# 生成时间: 2026-04-04
# 用途: 宝塔面板站点配置文件
# 路径: /www/server/panel/vhost/nginx/DjangoBlog.conf

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name www.zhtest.top;
    index index.html index.htm default.htm default.html;
    root /www/wwwroot/DjangoBlog;

    # --- Gzip 强力压缩：解决 3M 带宽瓶颈 ---
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;
    gzip_proxied any;
    gzip_buffers 16 8k;

    # --- Brotli 压缩（比 gzip 节省 15-20% 体积）---
    # 注意：需要先安装 nginx-module-brotli 模块
    # 宝塔面板：软件商店 -> Nginx -> 设置 -> 模块 -> 安装 ngx_brotli
    # 如果未安装模块，以下配置需保持注释状态
    # brotli on;
    # brotli_comp_level 6;
    # brotli_static on;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/xml+rss application/x-javascript image/svg+xml;
    # brotli_min_length 1024;
    # brotli_buffers 16 8k;

    # --- SSL 相关配置 [已优化安全] ---
    ssl_certificate /www/server/panel/vhost/cert/DjangoBlog/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/DjangoBlog/privkey.pem;
    
    # [修复] 移除已弃用的 TLSv1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    
    # [修复] 移除不安全的 3DES 算法
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # [修复] 增强 HSTS 配置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";
    # 安全头 - 防御纵深（与 Django 安全中间件双重防护）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:;" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    error_page 497 https://$host$request_uri;

    # HTTP 到 HTTPS 自动跳转逻辑
    set $isRedcert 1;
    if ($server_port != 443) { set $isRedcert 2; }
    if ($uri ~ /\.well-known/) { set $isRedcert 1; }
    if ($isRedcert != 1) { rewrite ^(/.*)$ https://$host$1 permanent; }

    # --- 静态资源优化：不走 Django，直接由 Nginx 吐出 ---
    location /static/ {
        alias /www/wwwroot/DjangoBlog/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location /media/ {
        alias /www/wwwroot/DjangoBlog/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # --- 反向代理配置：增加缓冲区，防止大页面传输中断 ---
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 针对 1.3MB 大页面的缓冲区优化
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;

        # 超时时间调整，防止高并发下出现 504
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 包含宝塔默认的其他配置
    include /www/server/panel/vhost/nginx/extension/DjangoBlog/*.conf;
    include /www/server/panel/vhost/nginx/well-known/DjangoBlog.conf;
    include /www/server/panel/vhost/rewrite/python_DjangoBlog.conf;

    # 禁止访问敏感文件
    location ~* (\.user\.ini|\.htaccess|\.env.*|\.git|\.project|requirements\.txt|pyproject\.toml)$ {
        return 404;
    }

    access_log /www/wwwlogs/DjangoBlog.log;
    error_log /www/wwwlogs/DjangoBlog.error.log;
}
