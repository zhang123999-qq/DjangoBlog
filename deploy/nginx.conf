# DjangoBlog Nginx 配置（Docker）

upstream django {
    server web:8000;  # Docker service name
}

server {
    listen 80;
    server_name _;

    # 最大上传文件 50MB
    client_max_body_size 50M;

    # 日志
    access_log /var/log/nginx/djangoblog_access.log;
    error_log /var/log/nginx/djangoblog_error.log;

    # 健康检查
    location /healthz/ {
        proxy_pass http://django/healthz/;
        access_log off;
    }

    # 静态文件（Django collectstatic 收集）
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # 压缩
        gzip_static on;
    }

    # 媒体文件（用户上传）
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 其他请求代理到 Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}
