# DjangoBlog 通用 Nginx 配置
# 适用于：Docker Compose / 标准 Linux 部署 / 阿里云 / 腾讯云
# 不适用于：宝塔面板（请使用 nginx.conf）
#
# 使用方法：
# 1. 复制到 /etc/nginx/sites-available/djangoblog
# 2. ln -s /etc/nginx/sites-available/djangoblog /etc/nginx/sites-enabled/
# 3. nginx -t && nginx -s reload
#
# 配置项：
# - server_name: 改为你的域名
# - upstream: 改为 Django 服务地址（默认 127.0.0.1:8000）
# - SSL 证书路径（如需 HTTPS）

upstream djangoblog_backend {
    # Django 应用地址
    # Docker Compose: web:8000
    # 本地部署: 127.0.0.1:8000
    server 127.0.0.1:8000;
    keepalive 32;
}

# HTTP 服务（可选：重定向到 HTTPS）
server {
    listen 80;
    server_name your-domain.com;  # 改为你的域名
    
    # 如需强制 HTTPS，取消注释以下行
    # return 301 https://$server_name$request_uri;
    
    # 静态资源（Nginx 直接服务，不走 Django）
    location /static/ {
        alias /var/www/djangoblog/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
    
    location /media/ {
        alias /var/www/djangoblog/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }
    
    # 反向代理到 Django
    location / {
        proxy_pass http://djangoblog_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时配置
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲配置
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
    }
    
    # 健康检查端点
    location /health/ {
        proxy_pass http://djangoblog_backend;
        proxy_set_header Host $host;
        access_log off;
    }
}

