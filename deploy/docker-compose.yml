# ========================================
# DjangoBlog Docker Compose (优化版 v2)
# ========================================
# 修复记录:
#   v2 - 修复: migrate 不重复 build（只有 web 定义 build）
#        修复: migrate 移除无用 volume
#        修复: migrate 补充 db health check 依赖
#        优化: 所有 Django 服务统一 image 名称
# ========================================

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  djangoblog:
    driver: bridge

services:
  # ========================================
  # MySQL 8.0 数据库
  # ========================================
  db:
    image: mysql:8.0
    container_name: djangoblog-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword123}
      - MYSQL_DATABASE=${DB_NAME:-djangoblog}
      - MYSQL_USER=${DB_USER:-djangouser}
      - MYSQL_PASSWORD=${DB_PASSWORD:-djangopassword123}
    ports:
      - "${DB_PORT_EXPOSED:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --max-connections=200
      --innodb-buffer-pool-size=256M

  # ========================================
  # Redis 7 缓存/消息队列
  # ========================================
  redis:
    image: redis:7-alpine
    container_name: djangoblog-redis
    restart: always
    ports:
      - "${REDIS_PORT_EXPOSED:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1

  # ========================================
  # 数据库迁移 (复用 web 的镜像，不重复 build)
  # ========================================
  migrate:
    image: djangoblog-web:latest
    container_name: djangoblog-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-fnOS2026-change-me-migrate}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword123}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - static_volume:/app/staticfiles
    networks:
      - djangoblog
    command: >
      sh -c "
        python manage.py migrate --noinput &&
        echo 'Migrations complete.'
      "

  # ========================================
  # Django Web 应用 (Gunicorn)
  # ========================================
  web:
    # 唯一 build 定义：所有 Django 服务共享此构建
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: djangoblog-web:latest
    container_name: djangoblog-web
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-fnOS2026-change-me-web}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword123}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - BAIDU_APP_ID=${BAIDU_APP_ID:-}
      - BAIDU_API_KEY=${BAIDU_API_KEY:-}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY:-}
    ports:
      - "${WEB_PORT_EXPOSED:-8000}:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: ["gunicorn", "config.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "4", "--worker-class", "gevent", "--worker-connections", "1000", "--timeout", "120", "--access-logfile", "-", "--error-logfile", "-"]

  # ========================================
  # Celery Worker (异步任务处理)
  # ========================================
  celery_worker:
    image: djangoblog-web:latest
    container_name: djangoblog-celery-worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-fnOS2026-change-me-celery}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword123}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - BAIDU_APP_ID=${BAIDU_APP_ID:-}
      - BAIDU_API_KEY=${BAIDU_API_KEY:-}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY:-}
    volumes:
      - logs_volume:/app/logs
      - media_volume:/app/media
    networks:
      - djangoblog
    command: ["celery", "-A", "config", "worker", "--loglevel=info", "--concurrency=4", "--pool=prefork", "--max-tasks-per-child=1000", "--queues=celery,low_priority"]

  # ========================================
  # Celery Beat (定时任务调度器)
  # ========================================
  celery_beat:
    image: djangoblog-web:latest
    container_name: djangoblog-celery-beat
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-fnOS2026-change-me-beat}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword123}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - logs_volume:/app/logs
    networks:
      - djangoblog
    command: ["celery", "-A", "config", "beat", "--loglevel=info"]

  # ========================================
  # Nginx 反向代理
  # ========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: djangoblog-nginx
    restart: always
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_PORT_EXPOSED:-80}:80"
      - "${NGINX_HTTPS_PORT_EXPOSED:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
