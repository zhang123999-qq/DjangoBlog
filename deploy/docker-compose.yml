# ========================================
# DjangoBlog Docker Compose
# ========================================
# 包含以下服务：
#   - web: Django 应用 (Gunicorn)
#   - mysql: MySQL 8.0 数据库
#   - redis: Redis 7 缓存/消息队列
#   - celery_worker: Celery 异步任务 Worker
#   - celery_beat: Celery 定时任务调度器
#   - nginx: Nginx 反向代理 + 静态文件
# ========================================

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:
  logs_volume:

networks:
  djangoblog:
    driver: bridge

services:
  # ----------------------------------------
  # MySQL 8.0 数据库
  # ----------------------------------------
  db:
    image: mysql:8.0
    container_name: djangoblog-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${DB_NAME:-djangoblog}
      - MYSQL_USER=${DB_USER:-djangouser}
      - MYSQL_PASSWORD=${DB_PASSWORD:-djangopassword}
    ports:
      - "${DB_PORT_EXPOSED:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
      --max-connections=200
      --innodb-buffer-pool-size=256M

  # ----------------------------------------
  # Redis 7 缓存/消息队列
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: djangoblog-redis
    restart: always
    ports:
      - "${REDIS_PORT_EXPOSED:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1

  # ----------------------------------------
  # Django Web 应用 (Gunicorn)
  # ----------------------------------------
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        - PYTHON_VER=3.13
    container_name: djangoblog-web
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - SENTRY_DSN=${SENTRY_DSN:-}
      - EMAIL_HOST=${EMAIL_HOST:-}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-True}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - BAIDU_APP_ID=${BAIDU_APP_ID:-}
      - BAIDU_API_KEY=${BAIDU_API_KEY:-}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY:-}
      - MODERATION_MODE=${MODERATION_MODE:-hybrid}
    ports:
      - "${WEB_PORT_EXPOSED:-8000}:8000"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------------------
  # 数据库迁移 (一次性)
  # ----------------------------------------
  migrate:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        - PYTHON_VER=3.13
    container_name: djangoblog-migrate
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - djangoblog
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        echo '数据库迁移和静态文件收集完成'
      "

  # ----------------------------------------
  # Celery Worker (异步任务处理)
  # ----------------------------------------
  celery_worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        - PYTHON_VER=3.13
    container_name: djangoblog-celery-worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - BAIDU_APP_ID=${BAIDU_APP_ID:-}
      - BAIDU_API_KEY=${BAIDU_API_KEY:-}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY:-}
    volumes:
      - logs_volume:/app/logs
      - media_volume:/app/media
    networks:
      - djangoblog
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=4
        --pool=prefork
        --max-tasks-per-child=1000
        --queues=celery,low_priority
    healthcheck:
      test: ["CMD", "celery", "-A", "config", "inspect", "ping", "--timeout=5"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ----------------------------------------
  # Celery Beat (定时任务调度器)
  # ----------------------------------------
  celery_beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        - PYTHON_VER=3.13
    container_name: djangoblog-celery-beat
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_ENGINE=${DB_ENGINE:-mysql}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-djangoblog}
      - DB_USER=${DB_USER:-djangouser}
      - DB_PASSWORD=${DB_PASSWORD:-djangopassword}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - DJANGO_SETTINGS_MODULE=config.settings.production
    volumes:
      - logs_volume:/app/logs
    networks:
      - djangoblog
    command: >
      celery -A config beat
        --loglevel=info
        --scheduler=django_celery_beat.schedulers:DatabaseScheduler
    # 注意: 需要安装 django-celery-beat 才能使用 DatabaseScheduler
    # 如需使用 simple scheduler，可改为:
    # command: celery -A config beat --loglevel=info

  # ----------------------------------------
  # Nginx 反向代理
  # ----------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: djangoblog-nginx
    restart: always
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_PORT_EXPOSED:-80}:80"
      - "${NGINX_HTTPS_PORT_EXPOSED:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro  # SSL 证书（可选）
    networks:
      - djangoblog
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/healthz/"]
      interval: 30s
      timeout: 5s
      retries: 3
