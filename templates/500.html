{% extends 'base.html' %}

{% block title %}服务器错误 - {{ site_config.site_title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="error-template">
                <h1 class="display-1">500</h1>
                <h2 class="mb-4">服务器错误</h2>
                <p class="text-muted mb-4">
                    抱歉，服务器遇到了一个问题。我们已经记录了此错误，请稍后再试。
                </p>
                <a href="{% url 'core:home' %}" class="btn btn-primary">
                    <i class="bi bi-house"></i> 返回首页
                </a>
            </div>
        </div>
    </div>
</div>

<style>
.error-template {
    padding: 60px 0;
}
.error-template h1 {
    font-size: 120px;
    color: #dc3545;
    opacity: 0.3;
}
.error-template h2 {
    color: #495057;
}
</style>
{% endblock %}
