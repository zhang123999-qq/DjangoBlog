{% load static %}
<!-- 科技风格导航栏 -->
<nav class="navbar navbar-expand-lg navbar-tech fixed-top">
    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'core:home' %}">
            <i class="bi bi-cpu-fill me-2"></i>
            <span>DjangoBlog</span>
        </a>
        
        <!-- 移动端菜单按钮 -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTech">
            <i class="bi bi-list text-light fs-4"></i>
        </button>
        
        <!-- 导航菜单 -->
        <div class="collapse navbar-collapse" id="navbarTech">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'core:home' %}">
                        <i class="bi bi-house-door me-1"></i>首页
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'blog' in request.path %}active{% endif %}" href="{% url 'blog:post_list' %}">
                        <i class="bi bi-journal-text me-1"></i>博客
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'forum' in request.path %}active{% endif %}" href="{% url 'forum:board_list' %}">
                        <i class="bi bi-chat-square-text me-1"></i>论坛
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if 'tools' in request.path %}active{% endif %}" href="{% url 'tools:tool_list' %}">
                        <i class="bi bi-tools me-1"></i>工具箱
                    </a>
                </li>
            </ul>
            
            <!-- 搜索框 -->
            <form class="search-box me-3 d-none d-lg-block" action="{% url 'core:search' %}" method="get">
                <i class="bi bi-search"></i>
                <input type="search" name="q" placeholder="搜索..." value="{{ request.GET.q }}">
            </form>
            
            <!-- 用户菜单 -->
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        {{ user.username }}
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                                <i class="bi bi-person me-2"></i>个人中心
                            </a>
                        </li>
                        {% if user.is_staff %}
                        <li>
                            <a class="dropdown-item" href="{% url 'admin:index' %}">
                                <i class="bi bi-speedometer2 me-2"></i>后台管理
                            </a>
                        </li>
                        {% endif %}
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" href="{% url 'accounts:logout' %}">
                                <i class="bi bi-box-arrow-right me-2"></i>退出登录
                            </a>
                        </li>
                    </ul>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="btn btn-tech-outline btn-sm me-2" href="{% url 'accounts:login' %}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>登录
                    </a>
                </li>
                <li class="nav-item">
                    <a class="btn btn-tech-primary btn-sm" href="{% url 'accounts:register' %}">
                        <i class="bi bi-person-plus me-1"></i>注册
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<!-- 导航栏滚动效果 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const navbar = document.querySelector('.navbar-tech');
    
    window.addEventListener('scroll', function() {
        if (window.scrollY > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });
});
</script>
