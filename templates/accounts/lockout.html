{% extends 'base.html' %}

{% block title %}账户已锁定 - {{ site_config.site_title }}{% endblock %}

{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h2 class="text-center">账户已锁定</h2>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger text-center">
                            <h4>您的账户已被临时锁定</h4>
                            <p>由于多次登录失败，您的账户已被临时锁定。请在一段时间后再尝试登录。</p>
                        </div>
                        <p class="text-center">
                            <a href="{% url 'core:home' %}" class="btn btn-primary">返回首页</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
