{% extends 'base.html' %}
{% load static %}

{% block title %}首页 - DjangoBlog{% endblock %}

{% block content %}
<!-- 统计卡片 -->
<section class="stats-section py-5 mt-5">
    <div class="container">
        <div class="row g-4">
            <div class="col-6 col-md-3">
                <div class="card text-center p-4">
                    <div class="stat-value display-5 fw-bold mb-2">
                        {{ user_count|default:0 }}
                    </div>
                    <div class="stat-label text-muted">
                        <i class="bi bi-people me-1"></i>注册人数
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center p-4">
                    <div class="stat-value display-5 fw-bold mb-2">
                        {{ view_count|default:0 }}
                    </div>
                    <div class="stat-label text-muted">
                        <i class="bi bi-eye me-1"></i>浏览人数
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center p-4">
                    <div class="stat-value display-5 fw-bold mb-2">
                        {{ post_count|default:0 }}
                    </div>
                    <div class="stat-label text-muted">
                        <i class="bi bi-file-text me-1"></i>文章数量
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card text-center p-4">
                    <div class="stat-value display-5 fw-bold mb-2">
                        {{ tool_count|default:0 }}
                    </div>
                    <div class="stat-label text-muted">
                        <i class="bi bi-tools me-1"></i>工具数量
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-3 mx-auto">
                <div class="card text-center p-4">
                    <div class="stat-value display-5 fw-bold mb-2">
                        {{ topic_count|default:0 }}
                    </div>
                    <div class="stat-label text-muted">
                        <i class="bi bi-chat-square-text me-1"></i>帖子数量
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
