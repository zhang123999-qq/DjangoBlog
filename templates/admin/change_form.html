{% extends "admin/base_site.html" %}
{% load i18n admin_urls static %}

{% block extrastyle %}
{{ block.super }}
<style>
    /* 变更页面样式 - 与前端风格统一 */
    #content-main {
        background: transparent;
    }
    
    /* 表单区域 */
    #content-main form {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        border-radius: 12px;
        padding: 25px;
        box-shadow: var(--card-shadow);
    }
    
    /* 字段集 */
    fieldset {
        border: 1px solid #e9ecef;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        background: white;
    }
    
    fieldset.collapsed {
        border-radius: 12px;
        background: white;
    }
    
    fieldset.collapsed h2 {
        background: transparent;
        color: var(--primary-color);
    }
    
    h2 {
        background: var(--primary-gradient);
        color: white;
        padding: 12px 15px;
        margin: -20px -20px 20px;
        border-radius: 12px 12px 0 0;
        font-weight: 600;
        border-bottom: none;
    }
    
    /* 表单行 */
    .form-row {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
        border: 1px solid transparent;
        transition: var(--transition);
    }
    
    .form-row:hover {
        border-color: #e9ecef;
        background: white;
    }
    
    .form-row label {
        min-width: 150px;
        padding-top: 8px;
        font-weight: 500;
        color: #495057;
    }
    
    .form-row label.required {
        color: #333;
    }
    
    .form-row label.required::after {
        content: ' *';
        color: #dc3545;
    }
    
    /* 输入框 */
    input[type=text], input[type=email], input[type=password], 
    input[type=number], input[type=url], input[type=date],
    input[type=time], input[type=datetime-local],
    textarea, select {
        background: white;
        border: 1px solid #e9ecef;
        border-radius: 8px;
        padding: 10px 15px;
        color: #333;
        transition: var(--transition);
        width: 100%;
        max-width: 600px;
    }
    
    input[type=text]:focus, input[type=email]:focus, 
    input[type=password]:focus, textarea:focus, select:focus,
    input[type=number]:focus, input[type=url]:focus,
    input[type=date]:focus, input[type=time]:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
    }
    
    /* 复选框 */
    input[type=checkbox] {
        width: 18px;
        height: 18px;
        accent-color: var(--primary-color);
    }
    
    /* 帮助文本 */
    .help {
        color: #6c757d;
        font-size: 0.85rem;
        margin-top: 5px;
        padding-left: 5px;
    }
    
    /* 错误信息 */
    .errorlist {
        background: rgba(220, 53, 69, 0.1);
        border: 1px solid rgba(220, 53, 69, 0.3);
        border-radius: 8px;
        padding: 10px 15px;
        margin-bottom: 15px;
        list-style: none;
    }
    
    .errorlist li {
        color: #dc3545;
        font-size: 0.9rem;
    }
    
    /* 提交区域 */
    .submit-row {
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid #e9ecef;
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
    }
    
    .submit-row input, .submit-row a.button {
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: 500;
        transition: var(--transition);
    }
    
    /* 对象历史 */
    .object-tools {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
    }
    
    .object-tools a {
        background: white;
        border: 1px solid #e9ecef;
        border-radius: 8px;
        padding: 8px 15px;
        color: #6c757d;
        text-decoration: none;
        transition: var(--transition);
    }
    
    .object-tools a:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
    }
    
    /* 相关对象 */
    .inline-group {
        background: rgba(255, 255, 255, 0.95);
        border: none;
        border-radius: 12px;
        margin-top: 20px;
        overflow: hidden;
        box-shadow: var(--card-shadow);
    }
    
    .inline-group h2 {
        margin: 0;
        border-radius: 0;
    }
    
    /* 数据表格 */
    #result_list {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--card-shadow);
        border: none;
    }
    
    #result_list thead th {
        background: var(--primary-gradient);
        color: white;
        font-weight: 600;
        padding: 15px;
        border-bottom: none;
    }
    
    #result_list tbody td {
        padding: 12px 15px;
        border-bottom: 1px solid #e9ecef;
        color: #333;
    }
    
    #result_list tbody tr:hover {
        background: rgba(0, 123, 255, 0.05);
    }
    
    /* TinyMCE 编辑器适配 */
    .tox-tinymce {
        border: 1px solid #e9ecef !important;
        border-radius: 8px !important;
    }
    
    .tox-toolbar__primary {
        background: #f8f9fa !important;
    }
    
    .tox-edit-area {
        background: white !important;
    }
    
    .tox-edit-area iframe {
        background: white !important;
    }
    
    /* 删除确认页 */
    .delete-confirmation {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 30px;
        box-shadow: var(--card-shadow);
    }
    
    .delete-confirmation h1 {
        color: #dc3545;
    }
    
    /* 选择器 */
    .selector .selector-available, .selector .selector-chosen {
        background: white;
        border: 1px solid #e9ecef;
        border-radius: 8px;
    }
    
    .selector .selector-available h2, .selector .selector-chosen h2 {
        background: var(--primary-gradient);
        color: white;
        border-bottom: none;
        padding: 12px 15px;
    }
</style>
{% endblock %}

{% block content %}
{{ block.super }}
{% endblock %}
