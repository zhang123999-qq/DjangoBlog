# DjangoBlog Pre-commit Configuration
# 使用方法:
#   1. pip install pre-commit
#   2. pre-commit install
#   3. pre-commit run --all-files (首次运行)

repos:
  # ============================================================
  # 代码格式化
  # ============================================================
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--line-length=120]
        exclude: ^(\.venv|venv|migrations)/

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=120]
        exclude: ^(\.venv|venv|migrations)/

  # ============================================================
  # 代码检查
  # ============================================================
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--max-line-length=120, --ignore=E203,W503,E501]
        exclude: ^(\.venv|venv|migrations|__pycache__)/

  # ============================================================
  # 类型检查
  # ============================================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies:
          - types-requests>=2.32.0
          - types-Markdown>=3.7.0
          - types-bleach>=6.2.0
          - types-croniter>=6.0.0
          - types-PyMySQL>=1.1.0
        exclude: ^(\.venv|venv|migrations|tests)/

  # ============================================================
  # 安全检查
  # ============================================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, -ll]
        files: ^apps/
        exclude: ^(\.venv|venv|migrations|tests)/

  # ============================================================
  # 通用检查
  # ============================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace       # 删除行尾空白
        exclude: ^(\.venv|venv)/
      - id: end-of-file-fixer         # 确保文件以换行符结尾
        exclude: ^(\.venv|venv)/
      - id: check-yaml                # YAML 语法检查
      - id: check-json                # JSON 语法检查
      - id: check-toml                # TOML 语法检查
      - id: check-added-large-files   # 检查大文件
        args: [--maxkb=500]
      - id: check-merge-conflict      # 检查合并冲突标记
      - id: check-case-conflict       # 检查文件名大小写冲突
      - id: detect-private-key        # 检测私钥泄露
      - id: debug-statements          # 检查调试语句 (pdb, breakpoint)

  # ============================================================
  # Django 特定检查
  # ============================================================
  - repo: https://github.com/adamchainz/django-upgrade
    rev: 1.22.2
    hooks:
      - id: django-upgrade
        args: [--target-version, "4.2"]

  # ============================================================
  # 依赖安全检查
  # ============================================================
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: pyproject.toml

# ============================================================
# CI 配置
# ============================================================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
