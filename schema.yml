      description: 主题 API
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 主题 的 唯一整数值。
        required: true
      tags:
      - topics
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
          description: ''
  /api/topics/{id}/replies/:
    get:
      operationId: topics_replies_retrieve
      description: 获取主题回复（分页）
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 主题 的 唯一整数值。
        required: true
      tags:
      - topics
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Topic'
          description: ''
  /api/upload/file/:
    post:
      operationId: upload_file
      summary: 上传通用文件（同步/异步）
      tags:
      - upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    type: string
                  filename:
                    type: string
                  size:
                    type: integer
          description: 同步上传成功
        '202':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: pending
                  upload_id:
                    type: string
                  task_id:
                    type: string
                  status_path:
                    type: string
          description: 异步处理已入队
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                NoFile:
                  value:
                    error_code: UPLOAD_NO_FILE
                    error: 没有上传文件
                    message: 没有上传文件
                  summary: No file
                FileTooLarge:
                  value:
                    error_code: UPLOAD_FILE_TOO_LARGE
                    error: 文件大小不能超过10MB
                    message: 文件大小不能超过10MB
                  summary: File too large
                FileTypeDenied:
                  value:
                    error_code: UPLOAD_FILE_TYPE_DENIED
                    error: 不允许上传该类型文件
                    message: 不允许上传该类型文件
                  summary: File type denied
                FileExtNotAllowed:
                  value:
                    error_code: UPLOAD_FILE_EXT_NOT_ALLOWED
                    error: 文件类型不在允许列表
                    message: 文件类型不在允许列表
                  summary: File ext not allowed
                DangerousMagic:
                  value:
                    error_code: UPLOAD_FILE_MAGIC_DENIED
                    error: 检测到危险文件头，上传被拒绝
                    message: 检测到危险文件头，上传被拒绝
                  summary: Dangerous magic
                ScanRejected:
                  value:
                    error_code: UPLOAD_SECURITY_SCAN_REJECTED
                    error: 文件安全扫描未通过
                    message: 文件安全扫描未通过
                  summary: Scan rejected
          description: 上传参数错误或安全校验失败
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                UploadSaveFailed:
                  value:
                    error_code: UPLOAD_SAVE_FAILED
                    error: 上传失败，请稍后重试
                    message: 上传失败，请稍后重试
                  summary: Upload save failed
          description: 上传保存失败
  /api/upload/image/:
    post:
      operationId: upload_image
      summary: 上传图片（同步）
      tags:
      - upload
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadImageRequest'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  location:
                    type: string
                required:
                - location
          description: 上传成功
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                NoFile:
                  value:
                    error_code: UPLOAD_NO_FILE
                    error: 没有上传文件
                    message: 没有上传文件
                  summary: No file
                ImageTooLarge:
                  value:
                    error_code: UPLOAD_IMAGE_TOO_LARGE
                    error: 文件大小不能超过5MB
                    message: 文件大小不能超过5MB
                  summary: Image too large
                ImageTypeNotAllowed:
                  value:
                    error_code: UPLOAD_IMAGE_TYPE_NOT_ALLOWED
                    error: 不支持的图片类型
                    message: 不支持的图片类型
                  summary: Image type not allowed
                ImageMagicInvalid:
                  value:
                    error_code: UPLOAD_IMAGE_MAGIC_INVALID
                    error: 图片文件头校验失败
                    message: 图片文件头校验失败
                  summary: Image magic invalid
                ScanRejected:
                  value:
                    error_code: UPLOAD_SECURITY_SCAN_REJECTED
                    error: 文件安全扫描未通过
                    message: 文件安全扫描未通过
                  summary: Scan rejected
          description: 上传参数错误
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                UploadSaveFailed:
                  value:
                    error_code: UPLOAD_SAVE_FAILED
                    error: 上传失败，请稍后重试
                    message: 上传失败，请稍后重试
                  summary: Upload save failed
          description: 上传保存失败
  /api/upload/status/{upload_id}/:
    get:
      operationId: upload_status
      summary: 查询异步上传状态
      parameters:
      - in: path
        name: upload_id
        schema:
          type: string
        required: true
      tags:
      - upload
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  upload_id:
                    type: string
                  location:
                    type: string
                  reason:
                    type: string
          description: 上传状态
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                TaskNotFound:
                  value:
                    error_code: UPLOAD_TASK_NOT_FOUND
                    error: 上传任务不存在或已过期
                    message: 上传任务不存在或已过期
                  summary: Task not found
          description: 任务不存在
components:
  schemas:
    Board:
      type: object
      description: 版块序列化器
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        topic_count:
          type: integer
          readOnly: true
        reply_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - reply_count
      - topic_count
    Category:
      type: object
      description: 分类序列化器
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 分类名称
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: ^[-a-zA-Z0-9_]+$
        post_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - post_count
    ModerationApproveSuccess:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
        id:
          type: integer
      required:
      - id
      - status
      - success
    ModerationMetricsResponse:
      type: object
      properties:
        success:
          type: boolean
        window_minutes:
          type: integer
        totals: {}
        peak_concurrency:
          type: integer
        series:
          type: array
          items: {}
        hotspots:
          type: array
          items: {}
        thresholds: {}
      required:
      - hotspots
      - peak_concurrency
      - series
      - success
      - thresholds
      - totals
      - window_minutes
    ModerationRejectRequest:
      type: object
      properties:
        review_note:
          type: string
    ModerationRejectSuccess:
      type: object
      properties:
        success:
          type: boolean
        status:
          type: string
        id:
          type: integer
      required:
      - id
      - status
      - success
    Notification:
      type: object
      description: 通知序列化器
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: 标题
          maxLength: 200
        content:
          type: string
          title: 内容
        notification_type:
          allOf:
          - $ref: '#/components/schemas/NotificationTypeEnum'
          title: 通知类型
        link:
          type: string
          format: uri
          title: 跳转链接
          maxLength: 200
        is_read:
          type: boolean
          title: 是否已读
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - content
      - created_at
      - id
      - title
    NotificationTypeEnum:
      enum:
      - comment
      - reply
      - like
      - system
      - moderation
      type: string
      description: |-
        * `comment` - 评论
        * `reply` - 回复
        * `like` - 点赞
        * `system` - 系统通知
        * `moderation` - 审核通知
    PaginatedBoardList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/Board'
    PaginatedCategoryList:
      type: object
