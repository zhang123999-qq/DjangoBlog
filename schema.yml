        category_name:
          type: string
          readOnly: true
      required:
      - author
      - category_name
      - id
      - title
    StatusEnum:
      enum:
      - draft
      - published
      - archived
      type: string
      description: |-
        * `draft` - 草稿
        * `published` - 发布
        * `archived` - 归档
    Tag:
      type: object
      description: 标签序列化器
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: 标签名称
          maxLength: 50
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        post_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - post_count
    Topic:
      type: object
      description: 主题序列化器
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        content:
          type: string
        views_count:
          type: integer
        reply_count:
          type: integer
        is_pinned:
          type: boolean
        is_locked:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        author:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        board:
          allOf:
          - $ref: '#/components/schemas/Board'
          readOnly: true
