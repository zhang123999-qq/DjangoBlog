      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModerationRejectRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ModerationRejectRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ModerationRejectRequest'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationRejectSuccess'
          description: 审核拒绝成功
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                InvalidType:
                  value:
                    error_code: MODERATION_INVALID_CONTENT_TYPE
