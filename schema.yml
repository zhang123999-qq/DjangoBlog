  /api/moderation/approve/{content_type}/{content_id}/:
    post:
      operationId: api_moderation_approve
      summary: 审核通过（JSON API）
      parameters:
      - in: path
        name: content_id
        schema:
          type: integer
        required: true
      - in: path
        name: content_type
        schema:
          type: string
        required: true
      tags:
      - moderation
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationApproveSuccess'
          description: 审核通过成功
        '400':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                InvalidType:
                  value:
                    error_code: MODERATION_INVALID_CONTENT_TYPE
                    error: 不支持的审核内容类型
                    message: 不支持的审核内容类型
                  summary: Invalid type
          description: 内容类型错误
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                PermissionDenied:
                  value:
                    error_code: MODERATION_PERMISSION_DENIED
                    error: 无审核权限
                    message: 无审核权限
                  summary: Permission denied
          description: 权限不足
        '404':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                ContentNotFound:
                  value:
                    error_code: MODERATION_CONTENT_NOT_FOUND
                    error: 审核对象不存在
                    message: 审核对象不存在
                  summary: Content not found
          description: 对象不存在
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                RateLimited:
                  value:
                    error_code: MODERATION_API_RATE_LIMITED
                    error: 审核请求过于频繁，请稍后再试
                    message: 审核请求过于频繁，请稍后再试
                  summary: Rate limited
                ConcurrencyLimited:
                  value:
                    error_code: MODERATION_API_CONCURRENCY_LIMITED
                    error: 审核服务繁忙，请稍后再试
                    message: 审核服务繁忙，请稍后再试
                  summary: Concurrency limited
          description: 限流/并发保护触发
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                ApproveFailed:
                  value:
                    error_code: MODERATION_APPROVE_FAILED
                    error: 审核通过操作失败，请稍后重试
                    message: 审核通过操作失败，请稍后重试
                  summary: Approve failed
          description: 审核失败
  /api/moderation/metrics/:
    get:
      operationId: api_moderation_metrics
      summary: 审核保护指标（最近 N 分钟）
      parameters:
      - in: query
        name: minutes
        schema:
          type: integer
        description: 统计窗口分钟数，1-120，默认10
      tags:
      - moderation
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModerationMetricsResponse'
          description: 获取成功
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
