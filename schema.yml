          readOnly: true
        title:
          type: string
          maxLength: 200
        views_count:
          type: integer
        reply_count:
          type: integer
        is_pinned:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        author:
          type: string
          readOnly: true
        board_name:
          type: string
          readOnly: true
      required:
      - author
      - board_name
      - created_at
      - id
      - title
    UploadFileRequest:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    UploadImageRequest:
      type: object
      properties:
        file:
          type: string
          format: uri
      required:
      - file
    User:
      type: object
      description: 用户序列化器
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          title: 用户名
          description: 必填；长度为150个字符或以下；只能包含字母、数字、特殊字符“@”、“.”、“-”和“_”。
        email:
          type: string
          format: email
          readOnly: true
        avatar:
          type: string
          readOnly: true
        bio:
          type: string
          readOnly: true
        website:
          type: string
          readOnly: true
      required:
      - avatar
      - bio
      - email
      - id
      - username
      - website
