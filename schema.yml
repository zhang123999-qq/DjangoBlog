                - error
                - message
              examples:
                ContentNotFound:
                  value:
                    error_code: MODERATION_CONTENT_NOT_FOUND
                    error: 审核对象不存在
                    message: 审核对象不存在
                  summary: Content not found
          description: 对象不存在
        '429':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                RateLimited:
                  value:
                    error_code: MODERATION_API_RATE_LIMITED
                    error: 审核请求过于频繁，请稍后再试
                    message: 审核请求过于频繁，请稍后再试
                  summary: Rate limited
                ConcurrencyLimited:
                  value:
                    error_code: MODERATION_API_CONCURRENCY_LIMITED
                    error: 审核服务繁忙，请稍后再试
                    message: 审核服务繁忙，请稍后再试
                  summary: Concurrency limited
          description: 限流/并发保护触发
        '500':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
                RejectFailed:
                  value:
                    error_code: MODERATION_REJECT_FAILED
                    error: 审核拒绝操作失败，请稍后重试
                    message: 审核拒绝操作失败，请稍后重试
                  summary: Reject failed
          description: 审核拒绝失败
