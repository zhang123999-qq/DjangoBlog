                    message: 不支持的审核内容类型
                  summary: Invalid type
          description: 内容类型错误
        '403':
          content:
            application/json:
              schema:
                type: object
                properties:
                  error_code:
                    type: string
                  error:
                    type: string
                  message:
                    type: string
                required:
                - error_code
                - error
                - message
              examples:
