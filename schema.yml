  /api/search/:
    get:
      operationId: global_search
      description: 同时搜索文章和论坛主题
      summary: 全局搜索
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
        description: 每个类型返回的最大结果数
      - in: query
        name: q
        schema:
          type: string
        description: 搜索关键词
        required: true
      tags:
