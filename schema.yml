      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      posts:
                        type: object
                      topics:
                        type: object
                      total:
                        type: integer
              examples:
                搜索示例:
                  value:
                    code: 200
                    message: success
                    success: true
                    data:
                      posts:
                        hits:
                        - id: '1'
                          title: Django 入门教程
                          content: '...'
                        total: 5
                      topics:
                        hits: []
                        total: 0
                      total: 5
          description: ''
