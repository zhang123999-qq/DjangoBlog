                $ref: '#/components/schemas/PaginatedCategoryList'
          description: ''
  /api/categories/{slug}/:
    get:
      operationId: categories_retrieve
      description: 分类 API
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      tags:
      - categories
