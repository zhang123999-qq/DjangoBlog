openapi: 3.0.3
info:
  title: DjangoBlog API
  version: 1.0.0
  description: 博客论坛系统 REST API
paths:
  /api/boards/:
    get:
      operationId: boards_list
      description: 版块 API
      parameters:
      - name: ordering
        required: false
        in: query
        description: 用于排序结果的字段。
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: 分页结果集中的页码。
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: 搜索关键词。
        schema:
          type: string
      tags:
      - boards
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBoardList'
          description: ''
  /api/boards/{id}/:
    get:
      operationId: boards_retrieve
      description: 版块 API
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 版块 的 唯一整数值。
        required: true
      tags:
      - boards
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
          description: ''
  /api/boards/{id}/topics/:
    get:
      operationId: boards_topics_retrieve
      description: 获取版块下的主题（分页）
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: 标识此 版块 的 唯一整数值。
        required: true
      tags:
      - boards
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Board'
          description: ''
  /api/categories/:
