            $ref: '#/components/schemas/TopicList'
    Post:
      type: object
      description: 文章序列化器
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: 标题
          maxLength: 200
        slug:
          type: string
          maxLength: 200
          pattern: ^[-a-zA-Z0-9_]+$
        summary:
          type: string
          title: 摘要
          maxLength: 500
        content:
          type: string
          title: 内容
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          title: 状态
        views_count:
          type: integer
          title: 浏览量
        allow_comments:
          type: boolean
          title: 允许评论
        published_at:
          type: string
          format: date-time
          nullable: true
          title: 发布时间
        created_at:
          type: string
          format: date-time
          readOnly: true
        author:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/Category'
          readOnly: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
      required:
      - author
      - category
      - content
      - created_at
      - id
      - tags
      - title
    PostList:
      type: object
      description: 文章列表序列化器
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          title: 标题
          maxLength: 200
        slug:
          type: string
          maxLength: 200
          pattern: ^[-a-zA-Z0-9_]+$
        summary:
          type: string
          title: 摘要
          maxLength: 500
        views_count:
          type: integer
