name: Publish Package

on:
  release:
    types: [published]

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # 用于 PyPI 可信发布

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  docker-hub:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/djangoblog:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/djangoblog:${{ steps.version.outputs.VERSION }}
          platforms: linux/amd64,linux/arm64

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [pypi, docker-hub]
    if: success()
    steps:
      - name: Send notification
        run: |
          echo "✅ Release published successfully!"
          echo "📦 PyPI: https://pypi.org/project/djangoblog/"
          echo "🐳 Docker: ${{ secrets.DOCKERHUB_USERNAME }}/djangoblog:latest"
