name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: '3.13'

jobs:
  # ========================================
  # 代码质量检查
  # ========================================
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements/development.txt

      - name: Python syntax check
        run: |
          uv run python -m py_compile \
            manage.py \
            config/celery.py \
            config/settings/base.py \
            config/settings/development.py \
            config/settings/production.py \
            apps/api/views.py \
            apps/core/upload_views.py \
            apps/forum/views.py

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DB_ENGINE: sqlite
          USE_REDIS: "False"
        run: uv run python manage.py check

      - name: Django deploy check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: sqlite
          USE_REDIS: "False"
          SECURE_SSL_REDIRECT: "False"
          SESSION_COOKIE_SECURE: "False"
          CSRF_COOKIE_SECURE: "False"
        run: uv run python manage.py check --deploy || true

      - name: Flake8
        run: |
          uv run flake8 apps/ config/ \
            --max-line-length=120 \
            --exclude=__pycache__,migrations,.venv \
            --extend-ignore=E501,W503

      - name: Mypy (scoped)
        run: |
          uv run mypy apps/api/ apps/blog/ \
            --ignore-missing-imports \
            --no-error-summary || true

  # ========================================
  # 单元测试 + 覆盖率
  # ========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: djangoblog_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements/development.txt
          uv pip install pytest-cov

      - name: Run migrations check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: djangoblog_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          USE_REDIS: "True"
          REDIS_URL: redis://127.0.0.1:6379/1
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: djangoblog_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          USE_REDIS: "True"
          REDIS_URL: redis://127.0.0.1:6379/1
        run: |
          uv run pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v || true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # 安全检查
  # ========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements/production.txt
          uv pip install bandit safety

      - name: Bandit security scan
        run: uv run bandit -r apps/ -ll --skip B101,B311 || true
        continue-on-error: true

      - name: Safety check
        run: uv run safety check --full-report || true
        continue-on-error: true

  # ========================================
  # 构建 Docker 镜像
  # ========================================
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/djangoblog:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/djangoblog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # 前端检查
  # ========================================
  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JS syntax check
        run: |
          node --check static/js/editor-init.js || true
          node --check static/js/admin-editor.js || true
          node --check static/js/upload-async-client.js || true
        continue-on-error: true
