name: CI/CD

on:
  push:
    branches: ["main", "develop"]
    tags:
      - 'v*'
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      debug_enabled:
        description: 'Run with debug logging'
        required: false
        default: 'false'

env:
  PYTHON_VERSION: '3.13'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================
  # Pre-commit 检查
  # ========================================
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        continue-on-error: true

  # ========================================
  # 代码质量检查
  # ========================================
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('requirements/development.txt', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements/development.txt

      - name: Python syntax check
        run: |
          uv run python -m py_compile \
            manage.py \
            config/celery.py \
            config/settings/base.py \
            config/settings/development.py \
            config/settings/production.py \
            apps/api/views.py \
            apps/core/upload_views.py \
            apps/forum/views.py

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DB_ENGINE: sqlite
          USE_REDIS: "False"
        run: uv run python manage.py check

      - name: Django deploy check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: sqlite
          USE_REDIS: "False"
          SECURE_SSL_REDIRECT: "False"
          SESSION_COOKIE_SECURE: "False"
          CSRF_COOKIE_SECURE: "False"
        run: uv run python manage.py check --deploy || true

      - name: Flake8
        run: |
          uv run flake8 apps/ config/ \
            --max-line-length=120 \
            --exclude=__pycache__,migrations,.venv \
            --extend-ignore=E501,W503,W293,W391,F401,F841,E402,F541,E201,E128,W292

      - name: Mypy (scoped)
        run: |
          uv run mypy apps/api/ apps/blog/ \
            --ignore-missing-imports \
            --no-error-summary || true

  # ========================================
  # 多版本测试
  # ========================================
  test:
    name: Test (Python ${{ matrix.python-version }}, DB ${{ matrix.db }})
    runs-on: ubuntu-latest
    needs: [lint, pre-commit]

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        db: ['sqlite', 'mysql']
        exclude:
          # SQLite 只测试最新 Python
          - python-version: '3.11'
            db: 'sqlite'
          - python-version: '3.12'
            db: 'sqlite'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: djangoblog_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('requirements/development.txt', 'pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-py${{ matrix.python-version }}-
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements/development.txt
          uv pip install pytest-cov pytest-xdist

      - name: Run migrations check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: djangoblog_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          USE_REDIS: "True"
          REDIS_URL: redis://127.0.0.1:6379/1
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: djangoblog_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          USE_REDIS: "True"
          REDIS_URL: redis://127.0.0.1:6379/1
        run: uv run python manage.py migrate

      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          DB_ENGINE: ${{ matrix.db }}
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: djangoblog_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          USE_REDIS: "True"
          REDIS_URL: redis://127.0.0.1:6379/1
        run: |
          uv run pytest apps/ \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: matrix.python-version == '3.13' && matrix.db == 'mysql'
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ========================================
  # 安全检查
  # ========================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements/production.txt
          uv pip install bandit safety pip-audit

      - name: Bandit security scan
        run: uv run bandit -r apps/ -ll --skip B101,B311
        continue-on-error: true

      - name: Safety check
        run: uv run safety check --full-report
        continue-on-error: true

      - name: Pip-audit
        run: uv run pip-audit
        continue-on-error: true

  # ========================================
  # 构建 Docker 镜像
  # ========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        if: github.event_name != 'pull_request'
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ========================================
  # 发布 Release
  # ========================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # 从 CHANGELOG.md 提取当前版本的变更记录
          if [ -f CHANGELOG.md ]; then
            awk '/^## \[${{ steps.version.outputs.VERSION }}\]/{flag=1;next}/^## /{flag=0}flag' CHANGELOG.md > /tmp/changelog.txt
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/changelog.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          generate_release_notes: true

      - name: Notify on success
        run: |
          echo "✅ Release ${{ steps.version.outputs.VERSION }} created successfully!"
          echo "📦 Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}"

  # ========================================
  # 前端检查
  # ========================================
  frontend:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JS syntax check
        run: |
          node --check static/js/editor-init.js || true
          node --check static/js/admin-editor.js || true
          node --check static/js/upload-async-client.js || true
        continue-on-error: true

  # ========================================
  # 依赖更新检查
  # ========================================
  dependabot:
    name: Check Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Check for updates
        run: |
          pip-compile --upgrade requirements/base.in -o requirements/base.txt
          pip-compile --upgrade requirements/production.in -o requirements/production.txt
          pip-compile --upgrade requirements/development.in -o requirements/development.txt
        continue-on-error: true

      - name: Create PR for updates
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: 'chore: update dependencies'
          body: |
            Automated dependency updates.

            Please review the changes and merge if appropriate.
          branch: dependabot/updates
          labels: dependencies
