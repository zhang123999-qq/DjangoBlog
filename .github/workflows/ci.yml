name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install deps (requirements)
        run: |
          uv venv
          uv pip install -r requirements/development.txt

      - name: Python syntax smoke
        run: |
          uv run python -m py_compile \
            manage.py \
            config/celery.py \
            config/settings/base.py \
            config/settings/development.py \
            config/settings/production.py \
            apps/api/views.py \
            apps/core/upload_views.py \
            apps/core/upload_tasks.py \
            apps/forum/views.py

      - name: Django system check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: db.sqlite3
          USE_REDIS: "False"
        run: uv run python manage.py check

      - name: Pytest smoke (P2)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: ci-test-secret-key
          DEBUG: "False"
          USE_REDIS: "False"
        run: |
          uv run pytest -q tests/test_p2_smoke.py

      - name: Node syntax smoke for key front-end files
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JS syntax check
        run: |
          node --check static/js/editor-init.js
          node --check static/js/admin-editor.js
          node --check static/js/upload-async-client.js

      - name: Scoped mypy check (release-blocking paths)
        run: |
          uv run python -m mypy apps/api/moderation_views.py apps/blog/tasks.py

      - name: Scoped flake8 check (release-blocking paths)
        run: |
          uv run python -m flake8 apps/api/moderation_views.py apps/blog/tasks.py --max-line-length=140 --extend-ignore=W293
